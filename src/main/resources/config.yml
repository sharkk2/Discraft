# -----------------------------
# Discraft Plugin Configuration
# -----------------------------

# Discord Bot Token
token: "YOUR_BOT_TOKEN_HERE"

# Admins
# This list holds the Discord user IDs of the bot's administrators.
# These admins can control and manage the bot's functionality on the server.
admins:
  - "1092548532180877415"  # Example Discord user ID of an admin
  - "987654321098765432"  # Another example of an admin ID

# Main server
# The main server (or guild) that the discord bot belongs to.
guild_id: "GUILD_ID"

# Chat Channel
# This is the Discord channel ID where the chat from the Minecraft server will be sent.
chat_channel: "YOUR_CHAT_CHANNEL_ID"

# Console Channel
# This is the Discord channel ID where the console logs from the Minecraft server will be sent. *optional
console_channel: "YOUR_CONSOLE_CHANNEL_ID"

allow_profanity: true # Filters swear words using "AI ✨" (⚠ can have false-positives and slow the chat down a little)
reactOnSuccess: true # Reacts with "📩" on a discord message when it successfully gets sent to the minecraft chat

chat_message: "**($player$)**: $message$" # The syntax of the incoming minecraft message sent in discord.
# where $player$ is replaced with player name and same for $message$
# example "$player$ is saying: $message$". *discord message markdown is supported.

# Bot status
# Leave as "" to view current minecraft server players
status: ""
activity_type: "1" # 0: Playing, 1: Listening, 2: Watching

# Whether to send Minecraft chat messages to Discord
chat_to_discord: true
# *starting your message with "!!" e.g "!!hey" the message will not be sent to discord/minecraft chat
# Whether to send Minecraft console messages to Discord
console_to_discord: true

# Whether to send discord messages to minecraft
discord_to_minecraft: true

# Events to send:
player_join: true
player_leave: true
player_death: true
player_advancements: true
server_on: true
server_off: true

# Other:
debug: false
